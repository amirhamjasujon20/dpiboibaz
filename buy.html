<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বই কিনুন - DPI Boi Baz</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Arial', sans-serif; background: radial-gradient(circle, rgba(224, 60, 49, 0.1) 20%, rgba(0, 103, 71, 0.1) 100%); min-height: 100vh; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .search-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; margin-bottom: 30px; }
        h2 { color: #006747; margin-bottom: 20px; }
        select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s; background: #f9f9f9; }
        select:focus { border-color: #006747; background: white; }
        .btn-search { width: 100%; background: #006747; color: white; border: none; padding: 12px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-search:hover { background: #004d35; transform: translateY(-2px); }
        
        .results-area { width: 100%; max-width: 600px; }
        .seller-group-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); border-left: 6px solid #006747; }
        .seller-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .seller-name { font-weight: bold; color: #333; font-size: 16px; }
        .contact-btn { background: #28a745; color: white; text-decoration: none; padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .contact-btn:hover { background: #218838; }

        /* বুক আইটেম আপডেট */
        .book-item { display: flex; align-items: flex-start; background: #fdfdfd; padding: 12px; border-radius: 10px; margin-top: 10px; border: 1px solid #eee; transition: 0.2s; }
        .book-item:hover { border-color: #006747; }
        .book-icon { font-size: 24px; margin-right: 15px; margin-top: 5px; }
        .book-info { flex-grow: 1; }
        .book-info h4 { margin: 0; font-size: 16px; color: #006747; margin-bottom: 4px; }
        .book-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 13px; color: #666; }
        .price-tag { color: #e03c31; font-weight: bold; font-size: 14px; }
        .year-tag { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
        
        .home-btn { position: fixed; bottom: 30px; left: 30px; width: 50px; height: 50px; background: #006747; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; }
    </style>
</head>
<body>

<div class="search-card">
    <h2>বই খুঁজুন</h2>
    
    <select id="semester">
        <option value="" disabled selected>সেমিস্টার নির্বাচন করুন</option>
        <option value="১ম">১ম সেমিস্টার</option>
        <option value="২য়">২য় সেমিস্টার</option>
        <option value="৩য়">৩য় সেমিস্টার</option>
        <option value="৪র্থ">৪র্থ সেমিস্টার</option>
        <option value="৫ম">৫ম সেমিস্টার</option>
        <option value="৬ষ্ঠ">৬ষ্ঠ সেমিস্টার</option>
        <option value="৭ম">৭ম সেমিস্টার</option>
        <option value="৮ম">৮ম সেমিস্টার</option>
    </select>

    <select id="technology">
        <option value="">টেকনোলজি নির্বাচন করুন</option>
        <option value="Architecture">Architecture</option>
        <option value="Automobile">Automobile</option>
        <option value="Chemical">Chemical</option>
        <option value="Civil">Civil</option>
        <option value="Civil (Wood)">Civil (Wood)</option>
        <option value="Computer">Computer</option>
        <option value="Electrical">Electrical</option>
        <option value="Electronics">Electronics</option>
        <option value="Environmental">Environmental</option>
        <option value="Food">Food</option>
        <option value="Mechanical">Mechanical</option>
        <option value="Power">Power</option>
        <option value="Refrigeration and Air Conditioning">RAC</option>
    </select>

    <button class="btn-search" onclick="searchBooks()">সার্চ করুন</button>
</div>

<div class="results-area" id="results"></div>

<a href="index.html" class="home-btn">🏠</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
            apiKey: "AIzaSyDbtD45rBSZN5RUXCHijFiabZ0uKPYeya0",
            authDomain: "boi-baz.firebaseapp.com",
            projectId: "boi-baz",
            storageBucket: "boi-baz.firebasestorage.app",
            messagingSenderId: "590447599233",
            appId: "1:590447599233:web:c969d315d5d4f2b3f87780"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.searchBooks = async function() {
        const tech = document.getElementById('technology').value;
        const sem = document.getElementById('semester').value;
        const resultArea = document.getElementById('results');

        if(!tech || !sem) { alert("সবগুলো ঘর পূরণ করুন।"); return; }

        resultArea.innerHTML = "<p style='text-align:center;'>খোঁজা হচ্ছে...</p>";

        try {
            const q = query(
                collection(db, "books"), 
                where("technology", "==", tech), 
                where("semester", "==", sem)
            );
            
            let querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                const qAlt = query(
                    collection(db, "books"), 
                    where("department", "==", tech), 
                    where("semester", "==", sem)
                );
                querySnapshot = await getDocs(qAlt);
            }

            resultArea.innerHTML = "";

            if (querySnapshot.empty) {
                resultArea.innerHTML = "<p style='text-align:center; color:#555;'>দুঃখিত, কোনো বই পাওয়া যায়নি।</p>";
                return;
            }

            const groups = {};
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const phone = data.phone;
                if (!groups[phone]) {
                    groups[phone] = { sellerName: data.sellerName, books: [] };
                }
                groups[phone].books.push(data);
            });

            for (const phone in groups) {
                const group = groups[phone];
                let bookItemsHtml = "";
                
                group.books.forEach(book => {
                    // তথ্য না থাকলে ডিফল্ট টেক্সট দেখাবে
                    const bPrice = book.price ? `${book.price} ৳` : "আলোচনা সাপেক্ষ";
                    const bYear = book.publishYear ? `প্রকাশ: ${book.publishYear}` : "সাল অজানা";
                    const bPublisher = book.publisher || "অন্যান্য";

                    bookItemsHtml += `
                        <div class="book-item">
                            <div class="book-icon">📚</div>
                            <div class="book-info">
                                <h4>${book.bookName}</h4>
                                <div class="book-meta">
                                    <span>প্রকাশনী: ${bPublisher}</span>
                                    <span class="year-tag">${bYear}</span>
                                </div>
                                <div style="margin-top:5px;">
                                    <span class="price-tag">মূল্য: ${bPrice}</span>
                                </div>
                            </div>
                        </div>`;
                });

                resultArea.innerHTML += `
                    <div class="seller-group-card">
                        <div class="seller-header">
                            <span class="seller-name">👤 ${group.sellerName}</span>
                            <a href="tel:${phone}" class="contact-btn">কল করুন</a>
                        </div>
                        <div class="books-list">${bookItemsHtml}</div>
                    </div>`;
            }
        } catch (error) {
            console.error(error);
            resultArea.innerHTML = "<p style='text-align:center; color:red;'>ডাটা লোড করতে সমস্যা হচ্ছে।</p>";
        }
    }
</script>
</body>
</html>
