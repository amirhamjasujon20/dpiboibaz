<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - DPI Boi Baz</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Arial',sans-serif;min-height:100vh;background:linear-gradient(135deg,#f0fff8 0%,#fff5f5 50%,#f0fff8 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px}
        
        .logo-section{text-align:center;margin-bottom:24px}
        .logo-section img{width:80px;height:80px;border-radius:20px;margin-bottom:10px;box-shadow:0 4px 15px rgba(0,103,71,0.2)}
        .logo-section h1{font-size:26px;color:#006747;font-weight:bold;margin-bottom:4px}
        .logo-section p{font-size:13px;color:#888}
        
        .card{background:white;border-radius:24px;padding:28px 24px;width:100%;max-width:400px;box-shadow:0 10px 40px rgba(0,0,0,0.1)}
        
        .btn-google{width:100%;padding:14px;background:#006747;color:white;border:none;border-radius:14px;font-size:15px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;transition:0.2s}
        .btn-google:hover{background:#004d35;transform:translateY(-1px)}
        .gmail-note{text-align:center;font-size:12px;color:#888;margin-bottom:20px}
        
        .divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
        .divider-line{flex:1;height:1px;background:#eee}
        .divider span{font-size:12px;color:#aaa;white-space:nowrap}

        /* নতুন ফোন ইনপুট স্টাইল */
        .phone-container {display: flex; gap: 10px; margin-bottom: 18px; position: relative;}
        
        .prefix-box {
            width: 70px; height: 52px; background: #006747; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; border-radius: 12px; font-size: 15px;
        }

        .phone-input-group { position: relative; flex: 1; }
        .phone-input-group input {
            width: 100%; padding: 15px 14px; border: 1.5px solid #ddd; 
            border-radius: 12px; font-size: 15px; outline: none; transition: 0.2s;
        }
        .phone-input-group label {
            position: absolute; top: 50%; left: 14px; transform: translateY(-50%);
            font-size: 14px; color: #aaa; pointer-events: none; transition: all 0.2s ease;
            background: white; padding: 0 4px;
        }
        .phone-input-group input:focus ~ label,
        .phone-input-group input:not(:placeholder-shown) ~ label {
            top: 0; font-size: 11px; color: #006747; font-weight: bold;
        }
        .phone-input-group input:focus { border-color: #006747; }
        .phone-input-group input.error-border { border-color: #E03C31; }

        .phone-error { font-size: 11px; color: #E03C31; position: absolute; bottom: -16px; left: 80px; display: none; }

        /* পাসওয়ার্ড ইনপুট স্টাইল */
        .input-group{position:relative;margin-bottom:18px}
        .input-group label{position:absolute;top:50%;left:14px;transform:translateY(-50%);font-size:14px;color:#aaa;pointer-events:none;transition:all 0.2s ease;background:white;padding:0 4px}
        .input-group input:focus ~ label,.input-group input:not(:placeholder-shown) ~ label{top:0;font-size:11px;color:#006747;font-weight:bold}
        .input-group input{width:100%;padding:15px 44px 15px 14px;border:1.5px solid #ddd;border-radius:12px;font-size:15px;outline:none;transition:0.2s;background:transparent}
        .input-group input:focus{border-color:#006747}
        
        .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#aaa;font-size:16px;background:none;border:none;padding:4px}
        
        .spinner{display:none;text-align:center;margin:10px 0}
        .spinner i{color:#006747;font-size:22px;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .btn-login{width:100%;padding:15px;background:#006747;color:white;border:none;border-radius:14px;font-size:17px;font-weight:bold;cursor:pointer;margin-bottom:16px;transition:0.2s}
        .btn-login:hover{background:#004d35;transform:translateY(-1px)}
        
        .forgot-link{display:block;text-align:center;color:#E03C31;font-weight:bold;font-size:14px;text-decoration:none;margin-bottom:14px;padding:6px}
        .signup-row{text-align:center;font-size:14px;color:#666}
        .signup-row a{color:#E03C31;font-weight:bold;text-decoration:none}

        /* Modal Styles */
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);backdrop-filter:blur(5px);justify-content:center;align-items:center;z-index:1000}
        .modal-box{background:white;padding:30px 24px;border-radius:22px;text-align:center;width:88%;max-width:320px;box-shadow:0 10px 30px rgba(0,0,0,0.2);animation:popUp 0.3s ease-out}
        @keyframes popUp{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
        .modal-icon{font-size:50px;margin-bottom:12px}
        .modal-title{font-size:18px;font-weight:bold;color:#333;margin-bottom:8px}
        .modal-msg{font-size:14px;color:#666;margin-bottom:20px;line-height:1.5}
        .modal-btn{background:#006747;color:white;border:none;padding:12px 30px;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer;width:100%;margin-bottom:8px}
        .modal-btn.gray{background:#eee;color:#333}
    </style>
</head>
<body>

<div class="logo-section">
    <img src="favicon.png" alt="DPI Boi Baz">
    <h1>DPI Boi Baz</h1>
    <p>বইয়ের ডিজিটাল বাজার</p>
</div>

<div class="card">
    <button class="btn-google" id="btnGoogleLogin">
        <i class="fa-solid fa-envelope"></i>
        Gmail দিয়ে লগইন করুন
    </button>
    <p class="gmail-note">পাসওয়ার্ড ছাড়া লগইন করুন</p>

    <div class="divider">
        <div class="divider-line"></div>
        <span>অথবা ফোন নাম্বার দিয়ে</span>
        <div class="divider-line"></div>
    </div>

    <div class="phone-container">
        <div class="prefix-box">+880</div>
        <div class="phone-input-group">
            <input type="tel" id="phone" placeholder=" " maxlength="10" oninput="validatePhone(this)">
            <label>নাম্বার লিখুন</label>
        </div>
        <div class="phone-error" id="phoneError">সঠিক নম্বর দিন</div>
    </div>

    <div class="input-group">
        <input type="password" id="pass" placeholder=" " maxlength="6">
        <label>পাসওয়ার্ড (৬ ডিজিট)</label>
        <button class="eye-btn" type="button" onclick="togglePass()">
            <i class="fa-solid fa-eye-slash" id="eyeIcon"></i>
        </button>
    </div>

    <div class="spinner" id="spinner"><i class="fa-solid fa-circle-notch"></i></div>

    <button class="btn-login" id="btnLogin" onclick="handleLogin()">লগইন</button>
    <a href="fpass.html" class="forgot-link">পাসওয়ার্ড ভুলে গেছেন?</a>
    <div class="signup-row">অ্যাকাউন্ট নেই? <a href="signup.html">নতুন তৈরি করুন</a></div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <div class="modal-icon" id="modalIcon"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-msg" id="modalMsg"></div>
        <div id="modalBtns"></div>
    </div>
</div>

<div id="g_id_onload"
     data-client_id="590447599233-jbv7hmk5bu0g65ae7jpe8d1clecqsetr.apps.googleusercontent.com"
     data-callback="handleCredentialResponse"
     data-auto_prompt="false">
</div>
<div class="g_id_signin" data-type="icon" style="display:none"></div>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbtD45rBSZN5RUXCHijFiabZ0uKPYeya0",
        authDomain: "boi-baz.firebaseapp.com",
        projectId: "boi-baz",
        storageBucket: "boi-baz.firebasestorage.app",
        messagingSenderId: "590447599233",
        appId: "1:590447599233:web:c969d315d5d4f2b3f87780"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ফোন নাম্বার ভ্যালিডেশন ফাংশন
    window.validatePhone = function(input) {
        const val = input.value;
        const err = document.getElementById('phoneError');
        let isValid = true;
        
        if (val.length >= 1 && val[0] !== '1') isValid = false;
        if (val.length >= 2 && !'3456789'.includes(val[1])) isValid = false;
        
        if (!isValid && val.length > 0) {
            input.classList.add('error-border');
            err.style.display = 'block';
        } else {
            input.classList.remove('error-border');
            err.style.display = 'none';
        }
    };

    window.togglePass = function() {
        const p = document.getElementById('pass');
        const i = document.getElementById('eyeIcon');
        if (p.type === 'password') { p.type = 'text'; i.classList.replace('fa-eye-slash','fa-eye'); }
        else { p.type = 'password'; i.classList.replace('fa-eye','fa-eye-slash'); }
    };

    document.getElementById('btnGoogleLogin').onclick = () => {
        document.querySelector('[role=button]')?.click();
    };

    window.handleCredentialResponse = async (response) => {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        const email = payload.email;
        showLoading(true);
        const snap = await getDocs(query(collection(db,"users"), where("email","==",email)));
        showLoading(false);
        if (!snap.empty) {
            const doc = snap.docs[0];
            const name = doc.data().name;
            showModal("😊","অ্যাকাউন্ট পাওয়া গেছে!",`'${name}' নামে অ্যাকাউন্ট আছে। লগইন করতে চান?`,[
                {text:"হ্যাঁ, লগইন করি", cls:"", click:()=>{ localStorage.setItem('userId',doc.id); localStorage.setItem('userName',name); window.location.href="index.html"; }},
                {text:"না", cls:"gray", click:closeModal}
            ]);
        } else {
            showModal("❌","অ্যাকাউন্ট নেই!","এই ইমেইলে কোনো অ্যাকাউন্ট নেই।",[{text:"ঠিক আছে",cls:"",click:closeModal}]);
        }
    };

    window.handleLogin = async function() {
        const phoneInput = document.getElementById('phone');
        const phone = phoneInput.value.trim();
        const pass = document.getElementById('pass').value.trim();
        
        if (!phone || !pass) { showModal("⚠️","ভুল!","সব ঘর পূরণ করুন।",[{text:"ঠিক আছে",cls:"",click:closeModal}]); return; }
        if (pass.length !== 6) { showModal("🚫","পাসওয়ার্ড","পাসওয়ার্ড ঠিক ৬ ডিজিট হতে হবে।",[{text:"ঠিক আছে",cls:"",click:closeModal}]); return; }
        
        showLoading(true);
        const snap = await getDocs(query(collection(db,"users"), where("phone","==","+880"+phone)));
        showLoading(false);
        
        if (!snap.empty && snap.docs[0].data().pass === pass) {
            localStorage.setItem('userId', snap.docs[0].id);
            localStorage.setItem('userName', snap.docs[0].data().name);
            window.location.href = "index.html";
        } else {
            showModal("❌","ব্যর্থ!","ভুল নম্বর বা পাসওয়ার্ড!",[{text:"আবার চেষ্টা করুন",cls:"",click:closeModal}]);
        }
    };

    function showLoading(show) {
        document.getElementById('spinner').style.display = show ? 'block' : 'none';
        document.getElementById('btnLogin').disabled = show;
        document.getElementById('btnGoogleLogin').disabled = show;
    }

    window.showModal = function(icon, title, msg, buttons) {
        document.getElementById('modalIcon').innerText = icon;
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        const area = document.getElementById('modalBtns');
        area.innerHTML = "";
        buttons.forEach(b => {
            const btn = document.createElement('button');
            btn.innerText = b.text;
            btn.className = 'modal-btn ' + (b.cls || '');
            btn.onclick = b.click;
            area.appendChild(btn);
        });
        document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = () => { document.getElementById('modal').style.display = 'none'; };
</script>
</body>
</html>
